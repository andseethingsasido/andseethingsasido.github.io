<!-- ==========================================================
    ✟ GOTHIC LUXURY HANDHELD NAVIGATION HEADER ✟
    ========================================================== -->

<!-- 1. 结构层 (HTML) -->
<header id="header">
    <!-- 动态解析：Logo 按钮（直接使用绝对根路径） -->
    <img class="logo-btn" 
         src="/images/logo.png" 
         alt="LOGO" 
         id="headerLogoBtn"
         onclick="window.location.href='/'">

    <!-- 右侧汉堡菜单触发器 -->
    <div class="menu-trigger" id="menuTrigger">
        <div class="menu-trigger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- 全屏/下拉遮罩菜单 -->
    <nav id="dropdown-menu">
        <div class="menu-links">
            <!-- 商店跳转链接（已同步移除 and666） -->
            <span class="menu-item" onclick="window.location.href='https://andseethingsasido.github.io/'">商店</span>
            <!-- 公众号唤起弹窗 -->
            <span class="menu-item" onclick="openWeChatCard()">公众号</span>
        </div>
    </nav>
</header>

<!-- ==========================================================
    ✟ 独立弹窗组件：公众号遮罩层 ✟
    ========================================================== -->
<div class="modal-overlay" id="qrcodeModal">
    <div class="modal-content">
        <!-- 关闭按钮 -->
        <span class="close-btn" id="closeTrigger">&times;</span>
        
        <!-- 弹窗哥特风标题 -->
        <div class="modal-title">Contact</div>
        
        <!-- 二维码图片：直接使用绝对根路径，彻底杜绝找不到文件的问题 -->
        <img src="/images/gozhonghao.jpg" alt="微信二维码" class="qrcode-img" id="modalQrcodeImg">
    </div>
</div>

<!-- 2. 样式层 (CSS) -->
<style>
    /* 引入高级哥特衬线字体 */
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');

    /* ------------------- 导航栏样式 ------------------- */
    #header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: transparent;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        z-index: 100010; 
        box-sizing: border-box;
        padding: 0 40px;
    }

    .logo-btn {
        width: auto;
        cursor: pointer;
        position: relative;
        z-index: 10003;
        transition: transform 0.3s, filter 0.3s; 
    }
    .logo-btn:hover { transform: scale(1.02); }
    .logo-btn.active { filter: invert(1); }

    .menu-trigger {
        position: absolute;
        right: 40px;
        top: 0;
        display: flex;
        align-items: center;
        z-index: 10002;
        cursor: pointer;
    }
    
    .menu-trigger-icon { 
        display: flex; 
        flex-direction: column; 
        justify-content: space-between;
    }
    .menu-trigger-icon span { 
        display: block; 
        width: 100%; 
        background: #fff; 
        transition: background 0.3s, transform 0.3s; 
    }
    
    .menu-trigger.active .menu-trigger-icon span { background: #000; }

    #dropdown-menu {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        transform: translateY(-100%); 
        background: #fff; 
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        box-sizing: border-box;
        z-index: 10001;
        display: flex;
        justify-content: flex-end; 
    }
    #dropdown-menu.show { transform: translateY(0); }

    .menu-links { 
        display: flex; 
        flex-direction: column; 
        align-items: flex-end;
        text-align: right;
        gap: 24px; 
    }
    
    .menu-item {
        font-family: "Helvetica Neue", Helvetica, Arial, -apple-system, sans-serif;
        font-size: 20px; 
        font-weight: 700; 
        letter-spacing: 0.15em; 
        color: #000; 
        cursor: pointer;
        transition: opacity 0.25s ease;
        white-space: nowrap;
        margin-right: -0.15em; 
    }
    .menu-item:hover { opacity: 0.6; }

    /* ------------------- 弹窗样式 ------------------- */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.92); 
        backdrop-filter: blur(4px); 
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100003; 
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
    }

    .modal-content {
        background-color: #ffffff; 
        border: 1px solid #000000; 
        padding: 35px 35px 45px 35px; 
        text-align: center;
        max-width: 320px;
        width: 90%;
        position: relative;
        transform: scale(0.96); 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
    }

    .modal-overlay.active .modal-content {
        transform: scale(1);
    }

    .modal-title {
        font-family: 'UnifrakturMaguntia', cursive;
        font-size: 26px;
        margin-bottom: 25px;
        color: #000000;
    }

    .qrcode-img {
        width: 160px; 
        height: 160px;
        object-fit: contain;
        margin: 0 auto;
        display: block;
        filter: grayscale(100%); 
        transition: filter 0.3s ease;
    }
    .qrcode-img:hover { 
        filter: grayscale(0%); 
    }

    .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 22px;
        color: #999999;
        cursor: pointer;
        transition: color 0.3s ease;
        user-select: none;
    }
    .close-btn:hover { color: #000000; }

    /* ------------------- 响应式断点 ------------------- */
    @media (max-width: 768px) {
        #header { height: 40px; padding: 0 20px; }
        .logo-btn { height: 20px; } 
        .menu-trigger { height: 40px; right: 20px; }
        .menu-trigger-icon { width: 18px; height: 10px; }
        .menu-trigger-icon span { height: 1.5px; }
        #dropdown-menu { padding: 70px 20px 40px; }
    }
    @media (min-width: 769px) {
        #header { height: 55px; }
        .logo-btn { height: 35px; } 
        .menu-trigger { height: 55px; }
        .menu-trigger-icon { width: 24px; height: 13px; } 
        .menu-trigger-icon span { height: 2px; }
        #dropdown-menu { padding: 90px 40px 45px; }
    }
</style>

<!-- 3. 行为层 (JavaScript) -->
<script>
    const trigger = document.getElementById('menuTrigger');
    const menu = document.getElementById('dropdown-menu');
    const logo = document.getElementById('headerLogoBtn');
    const modal = document.getElementById('qrcodeModal');
    const qrcodeImg = document.getElementById('modalQrcodeImg');
    const closeBtn = document.getElementById('closeTrigger');

    let isHoveringTrigger = false;
    let isHoveringMenu = false;
    let isHoveringLogo = false;
    let isClickOpen = false;

    function openMenu() {
        menu.classList.add('show');
        trigger.classList.add('active');
        if(logo) logo.classList.add('active');
    }

    function closeMenu() {
        menu.classList.remove('show');
        isClickOpen = false;
        
        if (modal && !modal.classList.contains('active')) {
            trigger.classList.remove('active');
            if(logo) logo.classList.remove('active');
        }
    }

    function checkMenuStatus() {
        setTimeout(() => {
            if (!isHoveringTrigger && !isHoveringMenu && !isHoveringLogo && !isClickOpen) {
                closeMenu();
            }
        }, 30);
    }

    // PC 端悬浮检测
    if (window.innerWidth >= 769) {
        trigger.addEventListener('mouseenter', () => {
            isHoveringTrigger = true;
            openMenu();
        });
        trigger.addEventListener('mouseleave', () => {
            isHoveringTrigger = false;
            checkMenuStatus();
        });

        menu.addEventListener('mouseenter', () => { isHoveringMenu = true; });
        menu.addEventListener('mouseleave', () => { isHoveringMenu = false; checkMenuStatus(); });

        if (logo) {
            logo.addEventListener('mouseenter', () => {
                isHoveringLogo = true;
                if (menu.classList.contains('show')) openMenu();
            });
            logo.addEventListener('mouseleave', () => {
                isHoveringLogo = false;
                checkMenuStatus();
            });
        }
    }

    // 移动端与全域点击闭合
    trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (menu.classList.contains('show')) {
            closeMenu();
        } else {
            isClickOpen = true;
            openMenu();
        }
    });

    window.addEventListener('scroll', () => {
        if (menu.classList.contains('show')) closeMenu();
    }, { passive: true });

    document.addEventListener('click', (e) => {
        if (menu.classList.contains('show') && !menu.contains(e.target) && !trigger.contains(e.target)) {
            closeMenu();
        }
    });

    // 🔗 唤起微信弹窗控制逻辑
    function openWeChatCard() {
        closeMenu(); 
        if (modal) {
            // 确保在任何层级的页面下，弹窗展开时都能准确拿到根路径下的图片
            if (qrcodeImg) {
                qrcodeImg.src = "/images/gozhonghao.jpg"; 
            }
            modal.classList.add('active'); 
            trigger.classList.add('active');
            if(logo) logo.classList.add('active');
        }
    }

    // 统一处理弹窗关闭函数
    function handleModalClose() {
        if (modal) {
            modal.classList.remove('active');
            trigger.classList.remove('active');
            if(logo) logo.classList.remove('active');
        }
    }

    // 弹窗关闭行为绑定
    if (closeBtn) {
        closeBtn.addEventListener('click', handleModalClose);
    }
    if (modal) {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) handleModalClose();
        });
    }
</script>
