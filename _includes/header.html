<!-- ==========================================================
   ✟ GOTHIC LUXURY HANDHELD NAVIGATION HEADER ✟
   ========================================================== -->

<!-- 1. 结构层 (HTML) -->
<header id="header">
    <!-- 动态解析：Logo 按钮 -->
    <img class="logo-btn" 
         src="{{ '/images/logo.png' | relative_url }}" 
         alt="LOGO" 
         id="headerLogoBtn"
         onclick="window.location.href='{{ '/' | relative_url }}'">

    <!-- 右侧汉堡菜单触发器 -->
    <div class="menu-trigger" id="menuTrigger">
        <div class="menu-trigger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- 全屏/下拉遮罩菜单 -->
    <nav id="dropdown-menu">
        <div class="menu-links">
            <!-- 商店跳转链接 -->
            <span class="menu-item" onclick="window.location.href='https://andseethingsasido.github.io/and666/'">商店</span>
            <!-- 公众号唤起弹窗：已修改为触发独立的组件弹窗 -->
            <span class="menu-item" onclick="openWeChatCard()">公众号</span>
        </div>
    </nav>
</header>

<!-- 2. 样式层 (CSS) -->
<style>
    #header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: transparent;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        z-index: 10000;
        box-sizing: border-box;
        padding: 0 40px;
    }

    .logo-btn {
        width: auto;
        cursor: pointer;
        position: relative;
        z-index: 10003;
        transition: transform 0.3s, filter 0.3s; 
    }
    .logo-btn:hover { transform: scale(1.02); }
    .logo-btn.active { filter: invert(1); }

    .menu-trigger {
        position: absolute;
        right: 40px;
        top: 0;
        display: flex;
        align-items: center;
        z-index: 10002;
        cursor: pointer;
    }
    
    .menu-trigger-icon { 
        display: flex; 
        flex-direction: column; 
        justify-content: space-between;
    }
    .menu-trigger-icon span { 
        display: block; 
        width: 100%; 
        background: #fff; 
        transition: background 0.3s, transform 0.3s; 
    }
    
    .menu-trigger.active .menu-trigger-icon span { background: #000; }

    #dropdown-menu {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        transform: translateY(-100%); 
        background: #fff; 
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        box-sizing: border-box;
        z-index: 10001;
        display: flex;
        justify-content: flex-end; 
    }
    #dropdown-menu.show { transform: translateY(0); }

    .menu-links { 
        display: flex; 
        flex-direction: column; 
        align-items: flex-end;
        text-align: right;
        gap: 24px; 
    }
    
    /* 👑 奢侈品官网视觉字体（大小放大1/3，颜色改为纯黑） */
    .menu-item {
        font-family: "Helvetica Neue", Helvetica, Arial, -apple-system, sans-serif;
        font-size: 20px; 
        font-weight: 700; 
        letter-spacing: 0.15em; 
        color: #000; 
        cursor: pointer;
        transition: opacity 0.25s ease;
        white-space: nowrap;
        margin-right: -0.15em; 
    }
    /* 悬停微调：纯黑字体可以通过微降透明度来做出高级的交互感 */
    .menu-item:hover { opacity: 0.6; }

    /* 响应式断点控制 */
    @media (max-width: 768px) {
        #header { height: 40px; padding: 0 20px; }
        .logo-btn { height: 20px; } 
        .menu-trigger { height: 40px; right: 20px; }
        .menu-trigger-icon { width: 18px; height: 10px; }
        .menu-trigger-icon span { height: 1.5px; }
        #dropdown-menu { padding: 70px 20px 40px; }
    }
    @media (min-width: 769px) {
        #header { height: 55px; }
        .logo-btn { height: 35px; } 
        .menu-trigger { height: 55px; }
        .menu-trigger-icon { width: 24px; height: 13px; } 
        .menu-trigger-icon span { height: 2px; }
        #dropdown-menu { padding: 90px 40px 45px; }
    }
</style>

<!-- 3. 行为层 (JavaScript) -->
<script>
    const trigger = document.getElementById('menuTrigger');
    const menu = document.getElementById('dropdown-menu');
    const logo = document.getElementById('headerLogoBtn');

    let isHoveringTrigger = false;
    let isHoveringMenu = false;
    let isHoveringLogo = false;
    let isClickOpen = false;

    function openMenu() {
        menu.classList.add('show');
        trigger.classList.add('active');
        if(logo) logo.classList.add('active');
    }

    function closeMenu() {
        menu.classList.remove('show');
        trigger.classList.remove('active');
        if(logo) logo.classList.remove('active');
        isClickOpen = false;
    }

    function checkMenuStatus() {
        setTimeout(() => {
            if (!isHoveringTrigger && !isHoveringMenu && !isHoveringLogo && !isClickOpen) {
                closeMenu();
            }
        }, 30);
    }

    // ==========================================
    // 💻 PC 端：智能悬浮与防滑出边界检测引擎
    // ==========================================
    if (window.innerWidth >= 769) {
        trigger.addEventListener('mouseenter', () => {
            isHoveringTrigger = true;
            openMenu();
        });
        trigger.addEventListener('mouseleave', () => {
            isHoveringTrigger = false;
            checkMenuStatus();
        });

        menu.addEventListener('mouseenter', () => {
            isHoveringMenu = true;
        });
        menu.addEventListener('mouseleave', () => {
            isHoveringMenu = false;
            checkMenuStatus();
        });

        if (logo) {
            logo.addEventListener('mouseenter', () => {
                isHoveringLogo = true;
                if (menu.classList.contains('show')) openMenu();
            });
            logo.addEventListener('mouseleave', () => {
                isHoveringLogo = false;
                checkMenuStatus();
            });
        }
    }

    // ==========================================
    // 📱 移动端与全域点击/滑动闭合引擎
    // ==========================================
    trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (menu.classList.contains('show')) {
            closeMenu();
        } else {
            isClickOpen = true;
            openMenu();
        }
    });

    window.addEventListener('scroll', () => {
        if (menu.classList.contains('show')) {
            closeMenu();
        }
    }, { passive: true });

    document.addEventListener('click', (e) => {
        if (menu.classList.contains('show') && !menu.contains(e.target) && !trigger.contains(e.target)) {
            closeMenu();
        }
    });

    // 🔗 智能对接提取出的独立弹窗组件
    function openWeChatCard() {
        closeMenu(); // 先收起下拉菜单
        
        // 优先匹配您最新提取的弹窗组件 id="qrcodeModal"
        const newModal = document.getElementById('qrcodeModal');
        if (newModal) {
            newModal.classList.add('active');
            return;
        }

        // 兜底兼容老系统里可能存在的 id="mask"
        const oldMask = document.getElementById('mask');
        if (oldMask) {
            oldMask.style.display = 'flex';
        }
    }
</script>
