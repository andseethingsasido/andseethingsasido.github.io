---
layout: null
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}

#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ==========================================================
   📱 仅移动端生效的独立尺寸 (同步 header 高度)
   ========================================================== */
@media (max-width: 768px) {
    body { padding-top: 55px; padding-bottom: 24px; }
}

/* ==========================================================
   💻 仅 PC 端生效的独立尺寸 (同步 header 高度)
   ========================================================== */
@media (min-width: 769px) {
    body { padding-top: 80px; padding-bottom: 24px; }
    #gifTop { width: 53%; max-width: 600px; }
}

/* A-F 矩阵 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 15px; 
}
.brand-tag {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    text-align: center;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.03);
}

/* 弹窗遮罩 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);justify-content:center;align-items:center;z-index:100003}

/* 弹出卡片样式 */
#card {
    background: #0a0a0c;
    padding: 35px; 
    border-radius: 0px;
    border: 1px solid #000;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}
#card img {
    width: min(40vw, 160px); 
    filter: grayscale(100%); 
    transition: filter 0.3s;
}
#card img:hover {filter: grayscale(0%)}
</style></head>
<body>

<!-- 🛠 动态召唤提取好的公共导航栏 -->
{% include header.html %}

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<!-- 二维码弹窗（路径已完美链接至 images/ 文件夹） -->
<div id="mask" onclick="if(event.target===this)this.style.display='none'">
    <div id="card">
        <img src="{{ '/images/gozhonghao.jpg' | relative_url }}">
    </div>
</div>

<script>
// 页面图片跳转逻辑
gifBottom.onclick = () => location.href = "https://andseethingsasido.github.io/and666/";
</script>
</body>
</html>
