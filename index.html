<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}

/* 为了给固定顶部栏留出空间，页面主体加一个 top padding */
body { padding-top: 100px; padding-bottom: 24px; }

#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
@media(min-width:769px){#gifTop{width:53%;max-width:600px}}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ✟ ERD 风格透明固定顶部栏 ✟ */
#header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: transparent; /* 初始完全透明 */
    display: flex;
    justify-content: center; /* 确保中间 Logo 居中 */
    align-items: center;
    z-index: 10000; /* 永远置顶 */
    box-sizing: border-box;
    padding: 0 40px;
    /* 加入背景色过渡 */
    transition: background 0.3s;
}

/* 中间核心 Logo - 提升 z-index 以在白色菜单上显示 */
.logo-btn {
    height: 45px;
    cursor: pointer;
    transition: transform 0.3s;
    position: relative;
    z-index: 10003;
}
.logo-btn:hover {
    transform: scale(1.03);
}

/* 汉堡菜单按钮（三条杠）- 缩小尺寸 - 提升 z-index */
.menu-trigger {
    position: absolute;
    right: 40px;
    top: 0;
    height: 80px; /* 与 header 同高 */
    display: flex;
    align-items: center; /* 垂直居中 */
    z-index: 10002;
    cursor: pointer;
}
/* 三条杠图标容器 */
.menu-trigger-icon {
    width: 20px; /* 缩小宽度 */
    height: 14px; /* 缩小高度 */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.menu-trigger-icon span {
    display: block;
    width: 100%;
    height: 1px; /* 极致纤细的切线 */
    background: #fff;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s, background 0.3s;
}

/* ✟ 横向铺满最顶端的下拉菜单栏 ✟ */
#dropdown-menu {
    position: absolute;
    top: 0; /* 覆盖最顶端 */
    left: 0;
    width: 100%; /* 横着铺满屏幕 */
    
    /* 初始隐藏状态：完全上滑并透明 */
    visibility: hidden;
    opacity: 0;
    transform: translateY(-100%); 
    
    /* 白色背景 */
    background: #fff; 
    
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-sizing: border-box;
    /* 顶部留出 header 高度的 padding，底部留出余量 */
    padding: 100px 10% 40px; 
    z-index: 10001; /* 介于 header 基础和 logo 之间 */
    display: flex;
    justify-content: flex-end; /* 内容靠右对齐 */
}

/* ✟ 核心 Hover 交互逻辑 (相对于整个 header) ✟ */

/* 当鼠标悬停在顶部 header 区域上时 */
#header:hover #dropdown-menu {
    visibility: visible;
    opacity: 1;
    transform: translateY(0); /* 滑动下落 */
}

/* Hover 时顶部 header 整体背景也变白（防止透明带来的断层） */
/* #header:hover {
    background: #fff;
} */

/* Hover 时三条杠变色，适应白色背景菜单 */
#header:hover .menu-trigger-icon span {
    background: #000;
}

/* 三条杠形变为 ✕ 的动态视觉 - 依然保留 */
#header:hover .menu-trigger-icon span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
#header:hover .menu-trigger-icon span:nth-child(2) { opacity: 0; }
#header:hover .menu-trigger-icon span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }


/* 菜单内部按钮载体 */
.menu-links {
    display: flex;
    flex-direction: column;
    gap: 15px;
    text-align: right; /* 文字右对齐 */
}
.menu-item {
    font-size: 14px; /* 小文字 */
    font-weight: 300;
    letter-spacing: 1px;
    color: #666; /* 适应白色背景 */
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-transform: uppercase;
    white-space: nowrap; /* 防止文字换行 */
}
.menu-item:hover {
    color: #000; /* 悬停变深 */
    transform: translateX(-3px); /* 悬停时向左微调 */
}

/* A-F 3个一组矩阵 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 15px; 
}
.brand-tag {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    text-align: center;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.03);
}

/* 弹窗遮罩 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);justify-content:center;align-items:center;z-index:100003}
#card {background:#0a0a0c;padding:30px;border-radius:0px;border:1px solid rgba(255,255,255,0.2);position:relative}
#card img {width:min(80vw,320px);filter: grayscale(100%); transition: filter 0.3s}
#card img:hover {filter: grayscale(0%)}
#close {position:absolute;right:12px;top:8px;font-size:20px;font-weight:200;cursor:pointer;color:#888}
#close:hover {color:#fff}

</style></head>
<body>

<!-- ✟ ERD 透明顶部导航栏 ✟ -->
<div id="header">
    <img src="and.png" class="logo-btn" onclick="location.href='https://andseethingsasido.github.io/'">
    
    <!-- 汉堡菜单悬停区 -->
    <div class="menu-trigger">
        <div class="menu-trigger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <!-- ✟ 横向铺满全屏下拉菜单栏 ✟ -->
    <div id="dropdown-menu">
        <div class="menu-links">
            <div class="menu-item" onclick="location.href='https://andseethingsasido.github.io/and666/'">商品</div>
            <div class="menu-item" onclick="mask.style.display='flex'">公众号</div>
        </div>
    </div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<!-- A-F 矩阵 -->
<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<div id="mask" onclick="if(event.target===this)this.style.display='none'">
<div id="card"><div id="close" onclick="mask.style.display='none'">✕</div><img src="gozhonghao.jpg"></div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";
</script>
</body>
</html>
