<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}

/* 页面顶部内边距同步缩减，适应更紧凑的 Header (原 140px) */
body { padding-top: 60px; padding-bottom: 24px; }

#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
@media(min-width:769px){#gifTop{width:53%;max-width:600px}}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ✟ ERD 风格透明固定顶部栏 ✟ */
#header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 45px; /* 【核心修正】Header 整体高度从 110px 缩减至 45px */
    background: transparent;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    z-index: 10000;
    box-sizing: border-box;
    padding: 0 40px;
}

/* 靠左大 Logo - 精准缩小至原先的三分之一 */
.logo-btn {
    height: 25px; /* 【核心修正】Logo 高度由 90px 缩小至 25px */
    width: auto;
    cursor: pointer;
    position: relative;
    z-index: 10003;
    transition: transform 0.3s, filter 0.3s; 
}
.logo-btn:hover {
    transform: scale(1.05);
}

/* 菜单激活时，Logo 变为反差色 */
.logo-btn.active {
    filter: invert(1);
}

/* 右侧汉堡菜单悬停区 */
.menu-trigger {
    position: absolute;
    right: 40px;
    top: 0;
    height: 45px; /* 【核心修正】触发区域高度与最新的 header 高度 45px 完美对齐 */
    display: flex;
    align-items: center;
    z-index: 10002;
    cursor: pointer;
}
.menu-trigger-icon {
    width: 20px; /* 汉堡菜单也等比微缩，更精致 */
    height: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.menu-trigger-icon span {
    display: block;
    width: 100%;
    height: 1.5px;
    background: #fff;
    transition: background 0.3s;
}

/* 当激活菜单时，三条杠变黑以适应白色背景 */
.menu-trigger.active .menu-trigger-icon span {
    background: #000;
}

/* ✟ 横向铺满全屏的下拉菜单栏 ✟ */
#dropdown-menu {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    
    /* 初始完全上滑隐藏 */
    visibility: hidden;
    opacity: 0;
    transform: translateY(-100%); 
    
    background: #fff; 
    
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-sizing: border-box;
    padding: 70px 40px 35px; /* 【核心修正】顶部内边距同步缩减，防止菜单项掉得太深 */
    z-index: 10001;
    display: flex;
    justify-content: center; 
}

/* 激活状态下的菜单栏样式 */
#dropdown-menu.show {
    visibility: visible;
    opacity: 1;
    transform: translateY(0);
}

/* 菜单内部按钮载体 */
.menu-links {
    display: flex;
    flex-direction: column;
    gap: 15px; /* 间距微调，更紧凑精致 */
    text-align: center; 
}
.menu-item {
    font-size: 15px; 
    font-weight: 400; 
    letter-spacing: 4px; 
    color: #555; 
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-transform: uppercase;
    white-space: nowrap;
}
.menu-item:hover {
    color: #000; 
    transform: scale(1.05); 
}

/* A-F 矩阵 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 15px; 
}
.brand-tag {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    text-align: center;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.03);
}

/* 弹窗遮罩 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);justify-content:center;align-items:center;z-index:100003}
#card {background:#0a0a0c;padding:30px;border-radius:0px;border:1px solid rgba(255,255,255,0.2);position:relative}
#card img {width:min(80vw,320px);filter: grayscale(100%); transition: filter 0.3s}
#card img:hover {filter: grayscale(0%)}
</style></head>
<body>

<!-- ✟ ERD 顶部导航栏 ✟ -->
<div id="header">
    <!-- 靠左大 Logo (高度已完美等比缩小) -->
    <img src="logo.png" class="logo-btn" id="logoBtn" onclick="location.href='https://andseethingsasido.github.io/'">
    
    <!-- 右侧三条杠 -->
    <div class="menu-trigger" id="menuTrigger">
        <div class="menu-trigger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <!-- 横向铺满下拉菜单栏 -->
    <div id="dropdown-menu" id="dropdownMenu">
        <div class="menu-links">
            <div class="menu-item" onclick="location.href='https://andseethingsasido.github.io/and666/'">商品</div>
            <div class="menu-item" onclick="mask.style.display='flex'">公众号</div>
        </div>
    </div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<!-- A-F 矩阵 -->
<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<!-- 公众号弹窗 -->
<div id="mask" onclick="if(event.target===this)this.style.display='none'">
    <div id="card">
        <img src="gozhonghao.jpg">
    </div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";

// ==========================================
// 🛠 *交互控制引擎*
// ==========================================
const trigger = document.getElementById('menuTrigger');
const menu = document.getElementById('dropdown-menu');
const logo = document.getElementById('logoBtn');

let isHoveringTrigger = false;
let isHoveringMenu = false;
let isHoveringLogo = false;
let isClickOpen = false;

function openMenu() {
    menu.classList.add('show');
    trigger.classList.add('active');
    logo.classList.add('active');
}

function closeMenu() {
    menu.classList.remove('show');
    trigger.classList.remove('active');
    logo.classList.remove('active');
    isClickOpen = false;
}

function checkMenuStatus() {
    setTimeout(() => {
        if (!isHoveringTrigger && !isHoveringMenu && !isHoveringLogo && !isClickOpen) {
            closeMenu();
        }
    }, 50);
}

// 监听 Logo 触碰
logo.addEventListener('mouseenter', () => {
    isHoveringLogo = true;
    if (menu.classList.contains('show')) {
        openMenu();
    }
});
logo.addEventListener('mouseleave', () => {
    isHoveringLogo = false;
    checkMenuStatus();
});

// 监听三条杠触碰
trigger.addEventListener('mouseenter', () => {
    isHoveringTrigger = true;
    openMenu();
});
trigger.addEventListener('mouseleave', () => {
    isHoveringTrigger = false;
    checkMenuStatus();
});

// 点击三条杠逻辑
trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    if (menu.classList.contains('show') && isClickOpen) {
        closeMenu();
    } else {
        isClickOpen = true;
        openMenu();
    }
});

// 监听白色菜单栏触碰
menu.addEventListener('mouseenter', () => {
    isHoveringMenu = true;
});
menu.addEventListener('mouseleave', () => {
    isHoveringMenu = false;
    checkMenuStatus();
});

// 点击空白处收起
document.addEventListener('click', (e) => {
    if (isClickOpen && !menu.contains(e.target) && !trigger.contains(e.target)) {
        closeMenu();
    }
});
</script>
</body>
</html>
