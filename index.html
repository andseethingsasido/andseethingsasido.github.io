<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        /* 全黑背景，并让视频完美居中 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer; /* 鼠标悬停时变成“手型”，提示用户可以点击 */
        }

        /* 视频样式：自适应屏幕大小，保持比例 */
        video {
            max-width: 90%;
            max-height: 90%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            outline: none;
        }
    </style>
</head>
<body>

    <!-- 
      src="video.mp4" 是你的视频文件名（确保和你上传的名字完全一致）
      loop: 循环播放
      muted: 静音（现代浏览器规定：只有静音的视频才允许在网页打开时“自动播放”）
      autoplay: 自动播放
      playsinline: 防止手机端全屏弹窗播放，保持在网页内
    -->
    <video id="myVideo" src="video.mp4" loop muted autoplay playsinline></video>

    <script>
        // 绑定点击事件：点击网页的任何地方（包括视频本身），就会跳转
        document.body.addEventListener('click', function() {
            // 将下方的网址改为你想跳转的“新网页”地址
            window.location.href = "https://andseethingsasido.github.io/and666/"; 
        });
    </script>

</body>
</html>
