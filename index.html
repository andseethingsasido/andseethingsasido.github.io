<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}

/* 为了给固定顶部栏留出空间，页面主体加一个 top padding */
body { padding-top: 100px; padding-bottom: 24px; }

#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
@media(min-width:769px){#gifTop{width:53%;max-width:600px}}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ✟ ERD 风格透明固定顶部栏 ✟ */
#header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: transparent; /* 完全透明 */
    display: flex;
    justify-content: center; /* 确保中间 Logo 居中 */
    align-items: center;
    z-index: 10000; /* 永远置顶 */
    box-sizing: border-box;
    padding: 0 40px;
}

/* 中间核心 Logo */
.logo-btn {
    height: 45px;
    cursor: pointer;
    transition: transform 0.3s;
}
.logo-btn:hover {
    transform: scale(1.03);
}

/* 右侧汉堡菜单按钮（三条杠） */
.menu-trigger {
    position: absolute;
    right: 40px;
    width: 28px;
    height: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 10002;
}
.menu-trigger span {
    display: block;
    width: 100%;
    height: 1px; /* 极致纤细的切线 */
    background: #fff;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
}
/* 三条杠形变为 ✕ 的动态视觉 */
.menu-trigger.active span:nth-child(1) { transform: translateY(9.5px) rotate(45deg); }
.menu-trigger.active span:nth-child(2) { opacity: 0; }
.menu-trigger.active span:nth-child(3) { transform: translateY(-9.5px) rotate(-45deg); }

/* ✟ 从上往下滑动的幕布式全屏菜单 ✟ */
#fullscreen-menu {
    position: fixed;
    top: -100%; /* 初始隐藏在屏幕上方 */
    left: 0;
    width: 100%;
    height: 100%;
    background: #000; /* 高级深邃纯黑 */
    z-index: 10001;
    transition: top 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    justify-content: flex-end; /* 内容靠右对齐 */
    align-items: center;
    box-sizing: border-box;
    padding-right: 10%; /* 距离右侧的黄金比例间距 */
}
#fullscreen-menu.open {
    top: 0; /* 滑动下落铺满屏幕 */
}

/* 菜单右侧按钮载体 */
.menu-links {
    display: flex;
    flex-direction: column;
    gap: 35px;
    text-align: right;
}
.menu-item {
    font-size: 24px;
    font-weight: 200;
    letter-spacing: 4px;
    color: #888;
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-transform: uppercase;
}
.menu-item:hover {
    color: #fff;
    transform: translateX(-5px); /* 悬停时向左微调，极具动感 */
}

/* A-F 3个一组矩阵 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 15px; 
}
.brand-tag {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    text-align: center;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.03);
}

/* 弹窗遮罩 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);justify-content:center;align-items:center;z-index:100003}
#card {background:#0a0a0c;padding:30px;border-radius:0px;border:1px solid rgba(255,255,255,0.2);position:relative}
#card img {width:min(80vw,320px);filter: grayscale(100%); transition: filter 0.3s}
#card img:hover {filter: grayscale(0%)}
#close {position:absolute;right:12px;top:8px;font-size:20px;font-weight:200;cursor:pointer;color:#888}
#close:hover {color:#fff}
</style></head>
<body>

<div id="header">
    <img src="and.png" class="logo-btn" onclick="location.href='https://andseethingsasido.github.io/'">
    <div class="menu-trigger" id="menuTrigger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div id="fullscreen-menu" id="fullscreenMenu">
    <div class="menu-links">
        <div class="menu-item" onclick="toggleMenu(); location.href='https://andseethingsasido.github.io/and666/'">商品</div>
        <div class="menu-item" onclick="toggleMenu(); mask.style.display='flex'">公众号</div>
    </div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<div id="mask" onclick="if(event.target===this)this.style.display='none'">
<div id="card"><div id="close" onclick="mask.style.display='none'">✕</div><img src="gozhonghao.jpg"></div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";

// ==========================================
// 🛠️ 全屏菜单滑出与控制引擎
// ==========================================
const menuTrigger = document.getElementById('menuTrigger');
const fullscreenMenu = document.getElementById('fullscreen-menu');

function toggleMenu() {
    menuTrigger.classList.toggle('active');
    fullscreenMenu.classList.toggle('open');
    
    // 打开菜单时禁止主页面滚动，关闭时恢复
    if(fullscreenMenu.classList.contains('open')) {
        document.body.style.overflow = 'hidden';
    } else {
        document.body.style.overflow = 'auto';
    }
}

menuTrigger.addEventListener('click', toggleMenu);
</script>
</body>
</html>
