<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Pong</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Simple Pong</h1>
    <canvas id="pong" width="800" height="500"></canvas>
    <p class="controls">Controls: Move mouse over canvas or use Up/Down arrows to move the left paddle.</p>
    <p class="notes">Click the canvas to (re)start. Scores reset on page reload.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
