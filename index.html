<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}

/* 1. 增加页面顶部内边距，适应加高的 Header */
body { padding-top: 130px; padding-bottom: 24px; }

#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
@media(min-width:769px){#gifTop{width:53%;max-width:600px}}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ✟ ERD 风格透明固定顶部栏 ✟ */
#header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    /* 1. 将 Header 高度从 80px 增加到 110px 以容纳放大的 Logo */
    height: 110px;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    box-sizing: border-box;
    padding: 0 40px;
    transition: background 0.3s;
}

/* 中间核心 Logo */
.logo-btn {
    /* 1. Logo 高度放大一倍，从 45px 变为 90px，等比例放大 */
    height: 90px;
    width: auto; /* 确保等比例 */
    cursor: pointer;
    transition: transform 0.3s;
    position: relative;
    z-index: 10003;
}
.logo-btn:hover {
    transform: scale(1.03);
}

/* 汉堡菜单悬停区 */
.menu-trigger {
    position: absolute;
    right: 40px;
    top: 0;
    /* 1. 悬停高度适应新的 Header */
    height: 110px;
    display: flex;
    align-items: center;
    z-index: 10002;
    cursor: pointer;
}
/* 三条杠图标容器 */
.menu-trigger-icon {
    width: 20px;
    height: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.menu-trigger-icon span {
    display: block;
    width: 100%;
    height: 1px;
    background: #fff;
    /* 过渡效果保留 */
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s, background 0.3s;
}

/* ✟ 横向铺满最顶端的下拉菜单栏 ✟ */
#dropdown-menu {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    
    visibility: hidden;
    opacity: 0;
    transform: translateY(-100%); 
    
    background: #fff; 
    
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-sizing: border-box;
    /* 1. 顶部 padding 增加，防止在 110px Header 上方显示 */
    padding: 130px 10% 40px; 
    z-index: 10001;
    display: flex;
    justify-content: flex-end;
}

/* ✟ 核心逻辑修改 ✟ */

/* 2. 只有鼠标放在三条杠 (.menu-trigger) 上时才弹出菜单 */
.menu-trigger:hover ~ #dropdown-menu {
    visibility: visible;
    opacity: 1;
    transform: translateY(0);
}

/* 3. 弹出菜单后，三条杠变色适应白色背景，但移除变为 ✕ 的动画 */
.menu-trigger:hover .menu-trigger-icon span {
    background: #000;
}

/* >>> 原有的 ✕ 形变动画代码已被删除 <<< */

/* 菜单内部按钮 */
.menu-links {
    display: flex;
    flex-direction: column;
    gap: 15px;
    text-align: right;
}
.menu-item {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 1px;
    color: #666;
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-transform: uppercase;
    white-space: nowrap;
}
.menu-item:hover {
    color: #000;
    transform: translateX(-3px);
}

/* A-F 矩阵 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 15px; 
}
.brand-tag {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    text-align: center;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.03);
}

/* 弹窗遮罩 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);justify-content:center;align-items:center;z-index:100003}
#card {background:#0a0a0c;padding:30px;border-radius:0px;border:1px solid rgba(255,255,255,0.2);position:relative}
#card img {width:min(80vw,320px);filter: grayscale(100%); transition: filter 0.3s}
#card img:hover {filter: grayscale(0%)}
/* 4. 移除了 #close ✕ 号的相关样式 */

</style></head>
<body>

<!-- ✟ ERD 透明顶部导航栏 ✟ -->
<div id="header">
    <img src="and.png" class="logo-btn" onclick="location.href='https://andseethingsasido.github.io/'">
    
    <!-- 2. 菜单悬停区 - 只有悬停在这里才会触发菜单和变色 -->
    <div class="menu-trigger">
        <div class="menu-trigger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <!-- ✟ 下拉菜单栏 ✟ -->
    <div id="dropdown-menu">
        <div class="menu-links">
            <div class="menu-item" onclick="location.href='https://andseethingsasido.github.io/and666/'">商品</div>
            <div class="menu-item" onclick="mask.style.display='flex'">公众号</div>
        </div>
    </div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<!-- A-F 矩阵 -->
<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<!-- 公众号弹窗 -->
<div id="mask" onclick="if(event.target===this)this.style.display='none'">
    <div id="card">
        <!-- 4. 已删除原有的右上角 ✕ 号元素 -->
        <img src="gozhonghao.jpg">
    </div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";
</script>
</body>
</html>
