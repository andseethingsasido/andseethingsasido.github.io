<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome</title>

<style>
html, body {
    margin: 0;
    padding: 30px 0;
    width: 100%;
    min-height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;

    /* 支持上下滚动 */
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
}

/* 通用 */
img{
    user-select:none;
    -webkit-user-drag:none;
}

/* 第一张 GIF */
#gifTop{
    width:80%;
    max-width:900px;
    height:auto;
    border-radius:4px;
    box-shadow:0 0 20px rgba(255,255,255,.1);
    margin:12px 0;
}

/* 电脑端缩小约三分之一 */
@media screen and (min-width:769px){
    #gifTop{
        width:53%;
        max-width:600px;
    }
}

/* 第二张 GIF（恢复原来的尺寸） */
#gifBottom{
    max-width:80%;
    max-height:45vh;
    width:auto;
    height:auto;
    border-radius:4px;
    box-shadow:0 0 20px rgba(255,255,255,.1);
    margin:12px 0;
    cursor:pointer;
}

/* 第三张 PNG */
#dao{
    width:80%;
    max-width:900px;
    height:auto;
    border:none;
    border-radius:0;
    box-shadow:none;
    margin:25px 0 40px;
}

</style>
</head>

<body>

    <!-- 第一张 -->
    <img id="gifTop" src="and666.gif" alt="Top">

    <!-- 第二张（点击跳转） -->
    <img id="gifBottom" src="and777.gif" alt="Bottom">

    <!-- 第三张 -->
    <img id="dao" src="dao.png" alt="DAO">

<script>
const gifBottom = document.getElementById("gifBottom");

gifBottom.addEventListener("click", function(e){
    e.stopPropagation();
    window.location.href = "https://andseethingsasido.github.io/and666/";
});
</script>

</body>
</html>
