<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        /* 全黑背景，并让视频完美居中 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer; /* 鼠标悬停时变成“手型”，提示用户可以点击 */
        }

        /* 视频样式：自适应屏幕大小，保持比例 */
        video {
            max-width: 90%;
            max-height: 90%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            outline: none;
        }
    </style>
</head>
<body>

    <!-- 
      src="video.mp4" 是你的视频文件名
      如果你的视频文件不叫 video.mp4，请记得把下面这行的名字改成你真实的视频文件名（注意大小写）
    -->
    <video id="myVideo" src="https://assets.mixkit.co/videos/preview/mixkit-playing-in-the-snow-1800-large.mp4" loop muted autoplay playsinline></video>

    <script>
        const video = document.getElementById('myVideo');
        let hasPlayed = false;

        // 尝试在页面加载时自动播放（静音状态）
        window.addEventListener('load', () => {
            video.play().catch(err => {
                console.log("自动播放被浏览器拦截，等待用户首次点击激活");
            });
        });

        // 监听整个页面的点击事件
        document.body.addEventListener('click', function() {
            if (!hasPlayed) {
                // 【第一次点击】：解除静音，开启声音并强行播放
                video.muted = false; 
                video.play();
                hasPlayed = true;   // 标记视频已经成功播放出声音
            } else {
                // 【第二次点击】：跳转到你的第二个新网页仓库
                window.location.href = "https://andseethingsasido.github.io/page2/"; 
            }
        });
    </script>

</body>
</html>
