<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}

#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ✟ ERD 风格透明固定顶部栏基础布局 ✟ */
#header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: transparent;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    z-index: 10000;
    box-sizing: border-box;
    padding: 0 40px;
}

/* 靠左 Logo 基础样式 */
.logo-btn {
    width: auto;
    cursor: pointer;
    position: relative;
    z-index: 10003;
    transition: transform 0.3s, filter 0.3s; 
}
.logo-btn:hover {
    transform: scale(1.03);
}
.logo-btn.active {
    filter: invert(1);
}

/* 右侧汉堡菜单悬停区基础样式 */
.menu-trigger {
    position: absolute;
    right: 40px;
    top: 0;
    display: flex;
    align-items: center;
    z-index: 10002;
    cursor: pointer;
}
.menu-trigger-icon {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.menu-trigger-icon span {
    display: block;
    width: 100%;
    height: 1.5px;
    background: #fff;
    transition: background 0.3s;
}
.menu-trigger.active .menu-trigger-icon span {
    background: #000;
}

/* 横向铺满下拉菜单栏基础样式 */
#dropdown-menu {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    transform: translateY(-100%); 
    background: #fff; 
    /* 🛠 彻底移除 opacity 和 visibility 过渡，只保留单纯的位移，确保上下推拉速度绝对一致且无虚化 */
    transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    box-sizing: border-box;
    z-index: 10001;
    display: flex;
    justify-content: center; 
}
#dropdown-menu.show {
    transform: translateY(0);
}

/* ==========================================================
   📱 仅移动端生效的独立尺寸 (20px)
   ========================================================== */
@media (max-width: 768px) {
    body { padding-top: 55px; padding-bottom: 24px; }
    #header { height: 40px; }
    .logo-btn { height: 20px; } 
    .menu-trigger { height: 40px; }
    .menu-trigger-icon { width: 22px; height: 13px; }
    #dropdown-menu { padding: 65px 40px 35px; }
}

/* ==========================================================
   💻 仅 PC 端生效的独立尺寸 (35px)
   ========================================================== */
@media (min-width: 769px) {
    body { padding-top: 80px; padding-bottom: 24px; }
    #gifTop { width: 53%; max-width: 600px; }
    #header { height: 55px; }
    .logo-btn { height: 35px; } 
    .menu-trigger { height: 55px; }
    .menu-trigger-icon { width: 22px; height: 14px; }
    #dropdown-menu { padding: 85px 40px 35px; }
}

/* 菜单内部按钮载体 */
.menu-links {
    display: flex;
    flex-direction: column;
    gap: 20px; 
    text-align: center; 
}
.menu-item {
    font-size: 15px; 
    font-weight: 400; 
    letter-spacing: 4px; 
    color: #555; 
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-transform: uppercase;
    white-space: nowrap;
}
.menu-item:hover {
    color: #000; 
    transform: scale(1.05); 
}

/* A-F 矩阵 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 15px; 
}
.brand-tag {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    text-align: center;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.03);
}

/* 弹窗遮罩 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);justify-content:center;align-items:center;z-index:100003}

/* 弹出卡片样式 */
#card {
    background: #0a0a0c;
    padding: 30px;
    border-radius: 0px;
    border: 1px solid #000; 
    position: relative;
}
#card img {width:min(80vw,320px);filter: grayscale(100%); transition: filter 0.3s}
#card img:hover {filter: grayscale(0%)}
</style></head>
<body>

<!-- ✟ ERD 顶部导航栏 ✟ -->
<div id="header">
    <img src="logo.png" class="logo-btn" id="logoBtn" onclick="location.href='https://andseethingsasido.github.io/'">
    
    <div class="menu-trigger" id="menuTrigger">
        <div class="menu-trigger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <div id="dropdown-menu" id="dropdownMenu">
        <div class="menu-links">
            <div class="menu-item" onclick="location.href='https://andseethingsasido.github.io/and666/'">商店</div>
            <div class="menu-item" onclick="mask.style.display='flex'">公众号</div>
        </div>
    </div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<div id="mask" onclick="if(event.target===this)this.style.display='none'">
    <div id="card">
        <img src="gozhonghao.jpg">
    </div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";

// ==========================================
// 🛠 *交互控制引擎*
// ==========================================
const trigger = document.getElementById('menuTrigger');
const menu = document.getElementById('dropdown-menu');
const logo = document.getElementById('logoBtn');

let isHoveringTrigger = false;
let isHoveringMenu = false;
let isHoveringLogo = false;
let isClickOpen = false;

function openMenu() {
    menu.classList.add('show');
    trigger.classList.add('active');
    logo.classList.add('active');
}

function closeMenu() {
    menu.classList.remove('show');
    trigger.classList.remove('active');
    logo.classList.remove('active');
    isClickOpen = false;
}

function checkMenuStatus() {
    setTimeout(() => {
        if (!isHoveringTrigger && !isHoveringMenu && !isHoveringLogo && !isClickOpen) {
            closeMenu();
        }
    }, 50);
}

logo.addEventListener('mouseenter', () => {
    isHoveringLogo = true;
    if (menu.classList.contains('show')) {
        openMenu();
    }
});
logo.addEventListener('mouseleave', () => {
    isHoveringLogo = false;
    checkMenuStatus();
});

trigger.addEventListener('mouseenter', () => {
    isHoveringTrigger = true;
    openMenu();
});
trigger.addEventListener('mouseleave', () => {
    isHoveringTrigger = false;
    checkMenuStatus();
});

trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    if (menu.classList.contains('show') && isClickOpen) {
        closeMenu();
    } else {
        isClickOpen = true;
        openMenu();
    }
});

menu.addEventListener('mouseenter', () => {
    isHoveringMenu = true;
});
menu.addEventListener('mouseleave', () => {
    isHoveringMenu = false;
    checkMenuStatus();
});

document.addEventListener('click', (e) => {
    if (isClickOpen && !menu.contains(e.target) && !trigger.contains(e.target)) {
        closeMenu();
    }
});

window.addEventListener('scroll', () => {
    if (menu.classList.contains('show')) {
        closeMenu();
    }
}, { passive: true });
</script>
</body>
</html>
